# Growth mode — start $40, scale risk as equity grows (cents: 4000 = $40).
# Same strategy/guardrails as settings.yaml; only sizing differs by balance tier.
#
# Tier logic: use the first tier whose until_equity >= current balance.
# allow_min_lot: take 0.01 lots when needed, capped at max_risk_when_min_lot (5%).
#
#   KILL_SWITCH_ENABLED=false .venv/bin/python run_period_backtest.py \
#     --config config/settings_growth.yaml --db data/forex_bot.db \
#     --start 2026-01-05 --end 2026-07-04 \
#     --log-dir logs/backtest/growth-period --no-telegram

pairs: [EURUSDm, GBPUSDm, AUDUSDm, NZDUSDm, USDJPYm, USDCADm, USDCHFm, BTCUSDm]

strategy: h4_pullback

risk_per_trade: 0.025

# Balance (cents) → risk fraction. Grows with the account like a disciplined trader.
growth_risk_tiers:
  - until_equity: 8000    # $0–$80:   1.0%
    risk_per_trade: 0.01
  - until_equity: 20000   # $80–$200: 1.5%
    risk_per_trade: 0.015
  - until_equity: 50000   # $200–$500: 2.0%
    risk_per_trade: 0.02
  - until_equity: 100000000
    risk_per_trade: 0.025

allow_min_lot: true
max_risk_when_min_lot: 0.05
min_equity_cents: 1500

max_open_trades: 8
max_per_symbol: 1
max_same_currency_bets: 4
daily_loss_limit: 0.07
max_drawdown_kill: 0.25
cooldown_after_loss_min: 10

session_utc: ["00:00", "23:59"]

max_spread_pips:
  EURUSDm: 1.5
  GBPUSDm: 2.0
  AUDUSDm: 2.0
  NZDUSDm: 3.0
  USDJPYm: 2.0
  USDCADm: 2.5
  USDCHFm: 2.5
  BTCUSDm: 80.0

trend_ema: 50
pullback_ema: 20
rsi_period: 14
atr_period: 14
atr_sl_mult: 1.2
tp_r_multiple: 1.5
spread_buffer_pips: 1.0

pullback_lookback: 20
pullback_expiry: 6
swing_lookback: 10
h1_slope_lookback: 5

breakout_lookback: 20
min_trend_atr_frac: 0.15
require_impulse_candle: true
breakout_rsi_long_max: 70.0
breakout_rsi_short_min: 30.0

h4_trend_ema: 50
h4_slope_lookback: 3
h4_atr_period: 14
h4_trail_atr_mult: 2.5
h4_trail_start_atr: 1.0
h4_trail_min_lock_r: 1.25
h4_breakeven_after_atr: 1.0
h4_min_slope_atr_frac: 0.06
h4_min_atr_percentile: 0
h4_atr_percentile_lookback: 126

h4_breakout_lookback: 20
h4_atr_sl_mult: 1.2
h4_max_sl_atr: 1.5
h4_tp_r_cap: 8.0

h4_pullback_ema: 20
h4_pullback_lookback: 12
h4_pullback_expiry: 4
h4_pullback_extension_atr: 1.0
h4_pullback_runners: true
h4_pullback_tp_cap: 8.0
h4_pullback_tp_r: 2.0
h4_pullback_max_age: 2
h4_swing_lookback: 8

backtest_start_equity: 4000

kill_switch_enabled: true

symbol_profiles:
  crypto:
    symbols: [BTCUSDm]
    max_spread_pips:
      BTCUSDm: 80.0
