# Volatile-universe config — NO majors. Gold + crypto only.
#
# Rationale (validated by backtests this session): currencies are driven by
# unpredictable macro/politics and barely trend, so trend-following bleeds on
# them. Crypto and gold actually trend, and h4_pullback made PF 1.51 on BTC
# fully out-of-sample. This points the SAME strategy at a basket of trending
# assets so the edge (if real) shows on more than one instrument.
#
# STEP 1 — pull the data (needs MT5 terminal + bridge running):
#   .venv/bin/python pull_data.py --config config/settings_volatile.yaml --db data/forex_bot.db
#   (BTCUSDm is already in the DB; this fetches ETHUSDm + XAUUSDm. If the broker
#    uses different names, adjust `pairs` to match Market Watch, e.g. XAUUSD.)
#
# STEP 2 — backtest (all of this is out-of-sample; nothing was tuned on it):
#   KILL_SWITCH_ENABLED=false .venv/bin/python run_period_backtest.py \
#     --config config/settings_volatile.yaml --db data/forex_bot.db \
#     --start 2024-09-05 --end 2026-07-03 \
#     --log-dir logs/backtest/volatile --no-telegram
#
# NOTE on capital: crypto/gold minimum lots need ~$2-4k to size at sane risk.
# Start equity is $4,000 to TEST THE EDGE; a $40 account can't trade these
# directly yet (that's the funded-account / grow-over-time question, separate
# from whether the edge is real).

pairs: [BTCUSDm, ETHUSDm, XAUUSDm]

strategy: h4_pullback

risk_per_trade: 0.02
max_open_trades: 3
max_per_symbol: 1
max_same_currency_bets: 3   # BTC/ETH USD legs are excluded; gold's USD leg counts
daily_loss_limit: 0.08
max_drawdown_kill: 0.25
cooldown_after_loss_min: 10

session_utc: ["00:00", "23:59"]

# pip units: BTC/ETH 1 pip = $1; gold 1 pip = $0.1. Spreads set accordingly.
max_spread_pips:
  BTCUSDm: 80.0     # ~$80
  ETHUSDm: 5.0      # ~$5
  XAUUSDm: 5.0      # ~$0.50

trend_ema: 50
pullback_ema: 20
rsi_period: 14
atr_period: 14
atr_sl_mult: 1.2
tp_r_multiple: 1.5
spread_buffer_pips: 2.0

pullback_lookback: 20
pullback_expiry: 6
swing_lookback: 10
h1_slope_lookback: 5

# h4_pullback (dip/rally entries in H4 trend, runners let winners ride)
h4_trend_ema: 50
h4_slope_lookback: 3
h4_atr_period: 14
h4_trail_atr_mult: 2.5
h4_trail_start_atr: 1.0
h4_trail_min_lock_r: 1.25
h4_breakeven_after_atr: 1.0
h4_min_slope_atr_frac: 0.06
h4_min_atr_percentile: 0
h4_atr_percentile_lookback: 126

h4_breakout_lookback: 20
h4_atr_sl_mult: 1.2
h4_max_sl_atr: 1.5
h4_tp_r_cap: 8.0

h4_pullback_ema: 20
h4_pullback_lookback: 12
h4_pullback_expiry: 4
h4_pullback_extension_atr: 1.0
h4_pullback_runners: true
h4_pullback_tp_cap: 8.0
h4_pullback_tp_r: 2.0
h4_pullback_max_age: 2
h4_swing_lookback: 8

backtest_start_equity: 400000   # $4,000 — enough to size crypto/gold at min lot

kill_switch_enabled: true
