# Forex bot configuration.
# Kill switch: default on. Override with KILL_SWITCH_ENABLED=false in .env for research only.

pairs: [EURUSDm, GBPUSDm, AUDUSDm, NZDUSDm, USDJPYm, USDCADm, USDCHFm, BTCUSDm]

strategy: h4_pullback

# --- Sizing ---
# Runners @ 2.5%: 61.7% WR, PF 1.00 — edge is real but avg loss ($102) was 2× avg win ($63).
# Fix: min 1.25R lock on trail exits + cap stop width; keep 2.5% until PF>1.05.

risk_per_trade: 0.025
max_open_trades: 8
max_per_symbol: 1
max_same_currency_bets: 4
daily_loss_limit: 0.07
max_drawdown_kill: 0.25
cooldown_after_loss_min: 10

session_utc: ["00:00", "23:59"]

max_spread_pips:
  EURUSDm: 1.5
  GBPUSDm: 2.0
  AUDUSDm: 2.0
  NZDUSDm: 3.0
  USDJPYm: 2.0
  USDCADm: 2.5
  USDCHFm: 2.5
  BTCUSDm: 80.0

trend_ema: 50
pullback_ema: 20
rsi_period: 14
atr_period: 14
atr_sl_mult: 1.2
tp_r_multiple: 1.5
spread_buffer_pips: 1.0

pullback_lookback: 20
pullback_expiry: 6
swing_lookback: 10
h1_slope_lookback: 5

breakout_lookback: 20
min_trend_atr_frac: 0.15
require_impulse_candle: true
breakout_rsi_long_max: 70.0
breakout_rsi_short_min: 30.0

h4_trend_ema: 50
h4_slope_lookback: 3
h4_atr_period: 14
h4_trail_atr_mult: 2.5
h4_trail_start_atr: 1.0
h4_trail_min_lock_r: 1.25 # trail exit never below 1.25R (fixes $52 win vs $102 loss)
h4_breakeven_after_atr: 1.0
h4_min_slope_atr_frac: 0.06
h4_min_atr_percentile: 0
h4_atr_percentile_lookback: 126

h4_breakout_lookback: 20
h4_atr_sl_mult: 1.2
h4_max_sl_atr: 1.5 # cap stop so losers aren't 2× winners in $
h4_tp_r_cap: 8.0

h4_pullback_ema: 20
h4_pullback_lookback: 12
h4_pullback_expiry: 4
h4_pullback_extension_atr: 1.0
h4_pullback_runners: true
h4_pullback_tp_cap: 8.0
h4_pullback_tp_r: 2.0
h4_pullback_max_age: 2
h4_swing_lookback: 8

backtest_start_equity: 400000

kill_switch_enabled: true

# Instrument-specific limits only (same strategy + risk as forex defaults above).
symbol_profiles:
  crypto:
    symbols: [BTCUSDm]
    max_spread_pips:
      BTCUSDm: 80.0
