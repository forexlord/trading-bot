# Forex bot configuration.
# Kill switch: default on. Override with KILL_SWITCH_ENABLED=false in .env for research only.

# Exness Standard Cent uses the "m" suffix (EURUSDm / GBPUSDm).
# Trend-following returns come from DIVERSIFICATION: more independent trends.
# USD-quote and USD-base majors only — the backtest pip-value model does not
# support crosses (EURJPY etc.). Re-run pull_data.py after changing this list.
pairs: [EURUSDm, GBPUSDm, AUDUSDm, NZDUSDm, USDJPYm, USDCADm, USDCHFm]

# Active strategy module: trend_pullback | breakout_trend | h4_trend
strategy: h4_trend

risk_per_trade: 0.01 # fraction of balance risked per trade
max_open_trades: 7 # total concurrent open trades across all pairs (7 pairs configured)
max_per_symbol: 1 # max concurrent open trades per symbol
max_same_currency_bets: 3 # open trades allowed sharing one currency+direction bet (1 = old binary correlation block)
daily_loss_limit: 0.04 # fraction of day-start equity; breach halts new entries until next broker day
max_drawdown_kill: 0.12 # fraction below high-water-mark equity; breach trips the kill switch
cooldown_after_loss_min: 15 # minutes after a losing trade before a new entry on that symbol is allowed

# h4_trend enters on H4 closes (00/04/08/12/16/20 UTC); a narrow session gate
# silently discards most of them. Restore ["07:00","16:00"] for M15 strategies.
session_utc: ["00:00", "23:59"]

max_spread_pips:
  EURUSDm: 1.5
  GBPUSDm: 2.0
  AUDUSDm: 2.0
  NZDUSDm: 3.0
  USDJPYm: 2.0
  USDCADm: 2.5
  USDCHFm: 2.5

# Shared indicator periods (slow/fast EMAs used by both strategies)
trend_ema: 50
pullback_ema: 20
rsi_period: 14
atr_period: 14
atr_sl_mult: 1.2 # slightly tighter than v1 pullback (was 1.5)
tp_r_multiple: 1.5 # 1.5R — easier target than 2R given historical WR ~34%
spread_buffer_pips: 1.0

# trend_pullback-only
pullback_lookback: 20
pullback_expiry: 6
swing_lookback: 10
h1_slope_lookback: 5

# breakout_trend-only
breakout_lookback: 20 # Donchian channel length on M15
min_trend_atr_frac: 0.15 # |EMA20-EMA50| must be >= this * H1 ATR
require_impulse_candle: true
breakout_rsi_long_max: 70.0
breakout_rsi_short_min: 30.0

# h4_trend-only (Turtle-adapted Donchian on H4 resampled from H1)
h4_breakout_lookback: 20 # H4 Donchian channel length (~3.3 days); tuned by run_walkforward.py
h4_trend_ema: 50 # H4 regime EMA (~8 days)
h4_slope_lookback: 3 # H4 bars back for EMA slope sign
h4_atr_period: 14
h4_atr_sl_mult: 2.0 # initial stop = 2N (Turtle); tuned by run_walkforward.py
h4_trail_atr_mult: 3.0 # chandelier trail distance; tuned by run_walkforward.py
h4_tp_r_cap: 8.0 # far disaster-cap TP; the trail is the real exit
h4_breakeven_after_atr: 1.5 # move SL to entry+buffer after this many ATRs in favor (0 = off)
h4_min_slope_atr_frac: 0.12 # skip weak trends: |EMA slope| >= 0.12 * ATR
h4_min_atr_percentile: 35 # skip bottom 35% of recent H4 ATR (chop filter)
h4_atr_percentile_lookback: 126 # ~21 H4 days for ATR percentile rank

backtest_start_equity: 400000 # account units ($4000 on Exness Standard Cent: 1 unit = $0.01)

# Default on. Override from .env with KILL_SWITCH_ENABLED=false for research backtests only.
kill_switch_enabled: true
